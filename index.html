<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regula Falsi Numerical Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen font-sans antialiased">

    <header class="border-b border-gray-200 bg-white">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="font-semibold text-base tracking-tight text-gray-900">Numerical Methods</span>
                <span class="text-gray-400">/</span>
                <span class="text-sm text-gray-600">Regula Falsi Solver</span>
            </div>
            <span class="text-xs font-mono text-gray-500 bg-gray-100 px-2 py-1 rounded border border-gray-200">64-bit Precision</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <div class="space-y-6 lg:col-span-1">
                <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm space-y-4">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-100 pb-2">Input Parameters</h2>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Function f(x)</label>
                        <input id="expr" type="text" value="x * log10(x) - 1" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-1.5 text-sm font-mono text-gray-900 focus:bg-white focus:outline-none focus:border-gray-800 transition">
                        <p class="text-[11px] text-gray-500 mt-1">Syntax: <code class="text-gray-700">pow(x,2)</code>, <code class="text-gray-700">sin(x)</code>, <code class="text-gray-700">log10(x)</code></p>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Interval [a]</label>
                            <input id="inputA" type="number" value="1" step="any" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-1.5 text-sm font-mono text-gray-900 focus:bg-white focus:outline-none focus:border-gray-800 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Interval [b]</label>
                            <input id="inputB" type="number" value="3" step="any" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-1.5 text-sm font-mono text-gray-900 focus:bg-white focus:outline-none focus:border-gray-800 transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Tolerance (eps)</label>
                        <input id="eps" type="number" value="0.0000000001" step="any" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-1.5 text-sm font-mono text-gray-900 focus:bg-white focus:outline-none focus:border-gray-800 transition">
                    </div>

                    <button onclick="runSolver()" class="w-full bg-gray-900 hover:bg-gray-800 text-white text-xs font-medium py-2 px-4 rounded transition active:scale-[0.99]">
                        Calculate Root
                    </button>
                    
                    <div id="errorBox" class="p-3 bg-red-50 border border-red-200 text-red-700 text-xs rounded hidden font-mono"></div>
                </div>

                <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 border-b border-gray-100 pb-2">Sample Expressions</h2>
                    <div class="space-y-1.5">
                        <button onclick="injectPreset('x*log10(x) - 1', 1, 3, 0.0000000001)" class="w-full text-left text-xs hover:bg-gray-100 border border-transparent p-2 rounded transition flex justify-between font-mono text-gray-700"><span>x · log10(x) - 1</span> <span class="text-gray-400">[1, 3]</span></button>
                        <button onclick="injectPreset('pow(x, 2) - 4', 0, 3, 0.0000000001)" class="w-full text-left text-xs hover:bg-gray-100 border border-transparent p-2 rounded transition flex justify-between font-mono text-gray-700"><span>x² - 4</span> <span class="text-gray-400">[0, 3]</span></button>
                        <button onclick="injectPreset('cos(x) - x', 0, 1, 0.0000000001)" class="w-full text-left text-xs hover:bg-gray-100 border border-transparent p-2 rounded transition flex justify-between font-mono text-gray-700"><span>cos(x) - x</span> <span class="text-gray-400">[0, 1]</span></button>
                    </div>
                </div>
            </div>

            <div class="space-y-6 lg:col-span-2">
                <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Function Plot</h2>
                    <div class="h-56 w-full">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                    <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Iteration Steps</h2>
                        <span id="iterCounter" class="text-xs font-mono text-gray-600 bg-gray-200 px-2 py-0.5 rounded">0 iterations</span>
                    </div>
                    <div class="overflow-x-auto max-h-80 overflow-y-auto">
                        <table class="w-full text-left border-collapse text-xs font-mono">
                            <thead>
                                <tr class="border-b border-gray-200 bg-gray-100 text-gray-600 sticky top-0">
                                    <th class="p-2.5">#</th>
                                    <th class="p-2.5">a</th>
                                    <th class="p-2.5">b</th>
                                    <th class="p-2.5">c (Root)</th>
                                    <th class="p-2.5">f(c)</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-gray-100 text-gray-800">
                                <tr>
                                    <td colspan="5" class="p-6 text-center text-gray-400 italic font-sans">Enter parameters and run to display results.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let chartInstance = null;

        function injectPreset(expr, a, b, eps) {
            document.getElementById('expr').value = expr;
            document.getElementById('inputA').value = a;
            document.getElementById('inputB').value = b;
            document.getElementById('eps').value = eps;
            runSolver();
        }

        function runSolver() {
            const exprStr = document.getElementById('expr').value;
            const a_val = parseFloat(document.getElementById('inputA').value);
            const b_val = parseFloat(document.getElementById('inputB').value);
            const eps_val = parseFloat(document.getElementById('eps').value);
            const errorBox = document.getElementById('errorBox');
            const tableBody = document.getElementById('tableBody');
            const iterCounter = document.getElementById('iterCounter');
            
            errorBox.classList.add('hidden');
            tableBody.innerHTML = '';

            let f;
            try {
                f = new Function('x', `with(Math) { return ${exprStr}; }`);
                if(isNaN(f(a_val)) || isNaN(f(b_val))) throw new Error();
            } catch(e) {
                errorBox.innerText = "Error evaluating function. Check mathematical expression.";
                errorBox.classList.remove('hidden');
                return;
            }

            let a = a_val, b = b_val;
            let fa = f(a), fb = f(b);

            if (fa * fb > 0) {
                errorBox.innerText = "Interval error: f(a) and f(b) must have opposite signs.";
                errorBox.classList.remove('hidden');
                return;
            }

            let steps = [];
            let c = a;
            let maxIter = 10000;

            for (let iter = 1; iter <= maxIter; iter++) {
                let current_fa = f(a);
                let current_fb = f(b);
                
                c = (a * current_fb - b * current_fa) / (current_fb - current_fa);
                let fc = f(c);

                steps.push({ iter, a, b, c, fc });

                if (Math.abs(fc) < eps_val || Math.abs(b - a) < 1e-18) break;

                if (current_fa * fc < 0) { b = c; } 
                else { a = c; }
            }

            iterCounter.innerText = `${steps.length} iterations`;

            steps.forEach(s => {
                const row = `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-2.5 text-gray-400">${s.iter}</td>
                        <td class="p-2.5">${s.a.toFixed(12)}</td>
                        <td class="p-2.5">${s.b.toFixed(12)}</td>
                        <td class="p-2.5 font-semibold text-gray-900">${s.c.toFixed(12)}</td>
                        <td class="p-2.5 ${Math.abs(s.fc) < eps_val ? 'text-gray-900 font-bold' : 'text-gray-500'}">${s.fc.toExponential(4)}</td>
                    </tr>`;
                tableBody.innerHTML += row;
            });

            renderChart(f, a_val, b_val, c);
        }

        function renderChart(f, start, end, root) {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            let labels = [];
            let dataPoints = [];
            
            let range = end - start;
            let graphStart = start - range * 0.15;
            let graphEnd = end + range * 0.15;
            let plotStep = (graphEnd - graphStart) / 80;

            for(let x = graphStart; x <= graphEnd; x += plotStep) {
                labels.push(x);
                dataPoints.push(f(x));
            }

            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'f(x)',
                            data: dataPoints,
                            borderColor: '#111827',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.1
                        },
                        {
                            label: 'Root',
                            data: [{x: root, y: f(root)}],
                            pointBackgroundColor: '#dc2626',
                            pointBorderColor: '#dc2626',
                            pointRadius: 5,
                            showLine: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            grid: { color: '#e5e7eb' },
                            ticks: { color: '#6b7280', font: { family: 'monospace', size: 10 } }
                        },
                        y: {
                            grid: { color: '#e5e7eb' },
                            ticks: { color: '#6b7280', font: { family: 'monospace', size: 10 } }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: () => `Point`,
                                label: (context) => `x: ${context.parsed.x.toFixed(6)}, y: ${context.parsed.y.toFixed(6)}`
                            }
                        }
                    }
                }
            });
        }
        
        runSolver();
    </script>
</body>
</html>
